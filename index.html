<h1>🔁 Inverting Amplifier</h1>

<!-- THEORY -->
<div class="card">
<h2>🧠 Concept</h2>
<p>
In an Inverting Amplifier, the input signal is applied to the <b>negative terminal</b> of the Op-Amp while the positive terminal is grounded.
Due to this configuration, the output signal is <span class="highlight">180° out of phase</span> with the input.
</p>
</div>

<!-- WORKING -->
<div class="card">
<h2>⚙️ Working Principle</h2>
<ul>
<li>Input current flows through <b>Rin</b></li>
<li>Op-Amp maintains <b>virtual ground</b> at inverting terminal</li>
<li>Feedback resistor <b>Rf</b> controls output voltage</li>
<li>Output adjusts to keep input difference ≈ 0</li>
</ul>
</div>

<!-- FORMULA -->
<div class="card">
<h2>📐 Formula</h2>
<p class="highlight">Vout = -(Rf / Rin) × Vin</p>
</div>

<!-- GAIN -->
<div class="card">
<h2>📊 Gain Analysis</h2>
<ul>
<li>If Rf > Rin → High Gain</li>
<li>If Rf = Rin → Gain = -1</li>
<li>If Rf < Rin → Low Gain</li>
</ul>
</div>

<!-- PHASE -->
<div class="card">
<h2>🔄 Phase Behavior</h2>
<p>
Input and output are completely inverted:
</p>

<div style="display:flex;justify-content:space-between;">
<div>📈 Input:  +ve → -ve → +ve</div>
<div>📉 Output: -ve → +ve → -ve</div>
</div>

</div>

<!-- CURRENT FLOW -->
<div class="card">
<h2>🔌 Current Flow Insight</h2>
<p>
No current enters the Op-Amp input (ideal case).  
All current flows through Rin and Rf, forming a closed feedback loop.
</p>

<h1>➕ Summing Amplifier</h1>

<!-- THEORY -->
<div class="card">
<h2>🧠 Concept</h2>
<p>
A Summing Amplifier is an extension of the inverting amplifier that allows <b>multiple input signals</b> to be combined into a single output.
Each input contributes to the final output voltage.
</p>
</div>

<!-- WORKING -->
<div class="card">
<h2>⚙️ Working Principle</h2>
<ul>
<li>Multiple inputs are applied through separate resistors</li>
<li>All currents combine at the inverting node</li>
<li>Op-Amp maintains <b>virtual ground</b></li>
<li>Output is proportional to the sum of input currents</li>
</ul>
</div>

<!-- FORMULA -->
<div class="card">
<h2>📐 Formula</h2>
<p class="highlight">Vout = -(Rf/R1·V1 + Rf/R2·V2 + Rf/R3·V3 + ...)</p>
</div>

<!-- SPECIAL CASE -->
<div class="card">
<h2>📊 Special Case (Equal Resistors)</h2>
<p>
If all input resistors are equal:
</p>

<p class="highlight">Vout = -(V1 + V2 + V3 + ...)</p>
</div>

<!-- CURRENT FLOW -->
<div class="card">
<h2>🔌 Current Flow Insight</h2>
<p>
Each input produces a current:
</p>

<ul>
<li>I1 = V1 / R1</li>
<li>I2 = V2 / R2</li>
<li>I3 = V3 / R3</li>
</ul>

<p>
All currents add and flow through feedback resistor:
</p>

<p class="highlight">I_total = I1 + I2 + I3</p>

<h1>⚖️ Differential Amplifier</h1>

<!-- THEORY -->
<div class="card">
<h2>🧠 Concept</h2>
<p>
A Differential Amplifier amplifies the <b>difference between two input signals</b> while rejecting any signal common to both inputs.
This makes it extremely useful in real-world noisy environments.
</p>
</div>

<!-- WORKING -->
<div class="card">
<h2>⚙️ Working Principle</h2>
<ul>
<li>Two inputs are applied: V1 and V2</li>
<li>Op-Amp amplifies (V2 - V1)</li>
<li>Common signals present on both inputs are rejected</li>
<li>Resistor network ensures balanced operation</li>
</ul>
</div>

<!-- FORMULA -->
<div class="card">
<h2>📐 Formula</h2>
<p class="highlight">Vout = (R2 / R1) × (V2 - V1)</p>
</div>

<!-- BALANCE CONDITION -->
<div class="card">
<h2>⚖️ Balance Condition</h2>
<p>
For accurate operation:
</p>

<p class="highlight">R2/R1 = R4/R3</p>

<p>
This ensures proper differential amplification and noise rejection.
</p>
</div>

<!-- CMRR -->
<div class="card">
<h2>🛡️ Common Mode Rejection</h2>
<p>
Differential amplifiers reject unwanted noise signals that appear equally on both inputs.
</p>

<ul>
<li>Desired signal → amplified</li>
<li>Noise (common signal) → rejected</li>
</ul>

<p>
This property is called <b>CMRR (Common Mode Rejection Ratio)</b>.
</p>
</div>

<!-- SIGNAL TYPES -->
<div class="card">
<h2>📊 Signal Types</h2>
<ul>
<li><b>Differential Signal:</b> Difference between inputs</li>
<li><b>Common Signal:</b> Same signal on both inputs</li>
</ul>
</div>

<!-- ADVANCED -->
<div class="card">
<h2>🧪 Advanced Insight</h2>
<ul>
<li>Used as input stage in most amplifiers</li>
<li>Foundation of instrumentation amplifiers</li>
<li>Highly noise-resistant design</li>
<li>Critical in precision measurement systems</li>
</ul>
</div>

<!-- REAL WORLD -->

<h2>🌍 Real-World Importance</h2>

<li>Biomedical signals (ECG, EEG)</li>
<li>Sensor signal processing</li>

<!-- VISUAL -->

<h1>📈 Integrator</h1>

<!-- THEORY -->
<div class="card">
<h2>🧠 Concept</h2>
<p>
An Integrator circuit produces an output proportional to the <b>integral (area under the curve)</b> of the input signal.
It is a fundamental building block in analog signal processing and mathematical computation.
</p>
</div>

<!-- WORKING -->
<div class="card">
<h2>⚙️ Working Principle</h2>
<ul>
<li>Input signal is applied through a resistor</li>
<li>A capacitor is used in the feedback path</li>
<li>Op-Amp maintains <b>virtual ground</b></li>
<li>Output continuously accumulates input signal over time</li>
</ul>
</div>

<!-- FORMULA -->
<div class="card">
<h2>📐 Formula</h2>
<p class="highlight">Vout = - (1 / RC) ∫ Vin dt</p>
</div>

<!-- SIGNAL TRANSFORMATION -->
<div class="card">
<h2>📊 Signal Transformation</h2>

<ul>
<li>Square wave → Triangle wave</li>
<li>Constant input → Ramp output</li>
<li>Sine wave → Phase shifted cosine</li>
</ul>

</div>

<!-- TIME BEHAVIOR -->
<div class="card">
<h2>⏳ Time Domain Insight</h2>
<p>
The output voltage depends on how long the input is applied:
</p>

<ul>
<li>Longer input → larger output</li>
<li>Faster change → steeper slope</li>
</ul>

</div>

<!-- CAPACITOR ROLE -->
<div class="card">
<h2>🔋 Role of Capacitor</h2>
<p>
The capacitor stores charge and integrates the input signal:
</p>

<ul>
<li>Charge accumulates over time</li>
<li>Voltage across capacitor increases gradually</li>
<li>This creates smooth output waveform</li>
</ul>
</div>

<!-- ADVANCED -->
<div class="card">
<h2>🧪 Advanced Insight</h2>
<ul>
<li>Acts as low-pass filter</li>
<li>High-frequency signals are attenuated</li>
<li>Important in analog computing systems</li>
<li>Used in waveform generation circuits</li>
</ul>
</div>

<!-- LIMITATIONS -->
<div class="card">
<h2>⚠️ Practical Limitations</h2>
<ul>
<li>Output saturation due to DC offset</li>
<li>Drift over time</li>
<li>Requires proper component selection</li>
</ul>
</div>
